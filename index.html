<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudChat</title>
    <meta name="description" content="Minimalist AI chat interface" />

    <meta property="og:title" content="CloudChat" />
    <meta property="og:description" content="Minimalist AI chat interface" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />

    <!-- Blocking theme script to prevent FOUC -->
    <script>
      (function() {
        try {
          var s = JSON.parse(localStorage.getItem('cloudchat-settings') || '{}');
          var t = s && s.state && s.state.theme;
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
          } else if (t === 'light') {
            document.documentElement.classList.add('light');
          } else {
            // system
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.add('light');
            }
          }
        } catch(e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
