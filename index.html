<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark</title>
    <meta name="description" content="The AI desktop with an autonomous agent brain." />
    <link rel="icon" type="image/png" href="/spark-favicon.png" />

    <meta property="og:title" content="Spark" />
    <meta property="og:description" content="Chat with AI. Deploy an agent. Spark something." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- Blocking theme script to prevent FOUC -->
    <script>
      (function() {
        try {
          var s = JSON.parse(localStorage.getItem('cloudchat-settings') || '{}');
          var t = s && s.state && s.state.theme;
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
          } else if (t === 'light') {
            document.documentElement.classList.add('light');
          } else {
            // system
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.add('light');
            }
          }
        } catch(e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
