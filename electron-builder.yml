appId: com.cloudchat.app
productName: CloudChat
directories:
  buildResources: build
  output: release
# Signs the bundled python-runtime binaries before electron-builder's main
# signing pass. See build/afterPack.cjs for the rationale.
afterPack: build/afterPack.cjs
files:
  - "out/**"
  - "server/**"
  - "node_modules/**"
  - "package.json"
  - "!**/.git"
  - "!**/node_modules/.cache"
  - "!docs/**"
  - "!src/**"
  - "!electron/**"
  - "!**/*.map"
  - "!**/*.test.*"
  - "!**/__tests__/**"
extraResources:
  # Bridge source — spawned by electron/bridge.ts at runtime.
  # CI also writes a python-runtime/ directory here per platform; on dev
  # machines that directory is absent and bridge.ts falls back to system Python.
  - from: "hermes-bridge"
    to: "hermes-bridge"
    filter:
      - "**/*.py"
      - "requirements.txt"
      - "data/**"
      - "!__pycache__/**"
      - "!venv/**"
      - "!.venv/**"
      - "!**/*.pyc"
      - "!**/*.pyo"
      - "!test_*.py"
      - "!*_test.py"
      - "!update.log"
  - from: "resources/python-runtime"
    to: "python-runtime"
mac:
  icon: build/icon.icns
  # Built per-architecture: the arm64 runner produces arm64 artifacts and the
  # x64 (macos-13) runner produces x64, each bundling a matching standalone
  # Python runtime (see release.yml). Omitting `arch` makes electron-builder
  # build for the host runner's architecture.
  target:
    - target: dmg
    - target: zip
  category: public.app-category.developer-tools
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
win:
  # TODO: replace with build/icon.ico for a proper Windows icon
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
  artifactName: "CloudChat-${version}-win.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CloudChat
dmg:
  # ${arch} keeps the arm64 and x64 DMGs from overwriting each other when both
  # macOS jobs publish to the same release.
  artifactName: "CloudChat-${version}-${arch}-mac.${ext}"
linux:
  icon: build/icon.png
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  artifactName: "CloudChat-${version}-linux-${arch}.${ext}"
publish:
  provider: github
  owner: DevvGwardo
  repo: cloud-chat-hub
  private: true
npmRebuild: false
asar: true
asarUnpack:
  - "server/**"
  - "node_modules/express/**"
  - "node_modules/cors/**"
