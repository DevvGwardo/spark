<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b0f"/>
      <stop offset="100%" stop-color="#0e1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF7A1A"/>
      <stop offset="100%" stop-color="#FF2D1A"/>
    </linearGradient>
    <linearGradient id="flameOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC24B"/>
      <stop offset="42%" stop-color="#FF7A1A"/>
      <stop offset="100%" stop-color="#FF2D1A"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE8A3"/>
      <stop offset="100%" stop-color="#FF8A2B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF7A1A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 L0 0 0 32" fill="none" stroke="#1b212b" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#grid)"/>
  <ellipse cx="180" cy="180" rx="360" ry="260" fill="url(#glow)"/>
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Flame mark -->
  <g transform="translate(96,118) scale(1.55)">
    <path d="M52 2 C61 22, 84 30, 82 58 C81 78, 66 100, 46 100 C26 100, 12 84, 16 62 C19 49, 33 47, 35 33 C37 22, 44 11, 52 2 Z" fill="url(#flameOuter)"/>
    <path d="M58 36 L84 60 L58 84 L58 66 L72 60 L58 54 Z" fill="#0b0b0f" opacity="0.20"/>
    <path d="M50 40 C56 53, 64 60, 60 72 C57 82, 49 86, 43 83 C35 79, 34 68, 39 60 C43 54, 48 50, 50 40 Z" fill="url(#flameInner)"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="320" y="190" font-family="'Geist','SF Pro Display','Inter',system-ui,sans-serif" font-size="82" font-weight="700" letter-spacing="-2.5" fill="#E8EAED">Cloud<tspan fill="#FF7A1A">Chat</tspan></text>
  <text x="324" y="236" font-family="'Inter',system-ui,sans-serif" font-size="22" fill="#9aa4b2" letter-spacing="0.2">AI chat client with an autonomous agent brain.</text>

  <!-- Feature badges -->
  <g font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#cbd5e1">
    <g transform="translate(324,272)">
      <rect width="142" height="30" rx="15" fill="#161b22" stroke="#2a313c" stroke-width="1"/>
      <circle cx="17" cy="15" r="3.5" fill="#FF7A1A"/>
      <text x="30" y="19">Hermes agent</text>
    </g>
    <g transform="translate(478,272)">
      <rect width="118" height="30" rx="15" fill="#161b22" stroke="#2a313c" stroke-width="1"/>
      <circle cx="17" cy="15" r="3.5" fill="#22c55e"/>
      <text x="30" y="19">15 providers</text>
    </g>
    <g transform="translate(608,272)">
      <rect width="150" height="30" rx="15" fill="#161b22" stroke="#2a313c" stroke-width="1"/>
      <circle cx="17" cy="15" r="3.5" fill="#38bdf8"/>
      <text x="30" y="19">GitHub workflow</text>
