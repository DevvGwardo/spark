name: Feature Request
description: Suggest a feature or improvement.
title: "[Feature] "
labels: ["enhancement", "beta"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What were you trying to do when you wished CloudChat had this?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use it weekly
        - Blocks me from using CloudChat for real work
    validations:
      required: true
