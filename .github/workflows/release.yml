name: Release

# Triggers a build whenever a version tag is pushed.
# Use prerelease tags for beta builds: v1.0.0-beta.1, v1.0.0-beta.2, ...
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0-beta.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest is arm64; macos-13 is the Intel (x64) runner. Each
          # bundles a Python runtime matching its own architecture.
          - os: macos-latest
            build_cmd: npm run electron:publish
            py_target: aarch64-apple-darwin
          - os: macos-13
            build_cmd: npm run electron:publish
            py_target: x86_64-apple-darwin
          - os: windows-latest
            build_cmd: npm run electron:publish:win
            py_target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            build_cmd: npm run electron:publish:linux
            py_target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Download python-build-standalone for the current runner so the
      # bundled app ships a self-contained Python interpreter. Pinned to a
      # known release of indygreg/python-build-standalone.
      # Bundled Python target triple, selected per matrix entry. Quoted into an
      # env var so the workflow expression never lands inside a shell command.
      - name: Download bundled Python (macOS / Linux)
        if: runner.os == 'macOS' || runner.os == 'Linux'
        shell: bash
        env:
          PY_TARGET: ${{ matrix.py_target }}
        run: |
          set -euo pipefail
          PY_VERSION="3.12.7"
          BUILD_DATE="20241016"
          # Universal2 isn't published; ship an arch-specific runtime per job.
          TARBALL="cpython-${PY_VERSION}+${BUILD_DATE}-${PY_TARGET}-install_only.tar.gz"
          URL="https://github.com/indygreg/python-build-standalone/releases/download/${BUILD_DATE}/${TARBALL}"
          mkdir -p resources/python-runtime
          curl -fsSL "$URL" -o /tmp/python.tar.gz
          tar -xzf /tmp/python.tar.gz -C /tmp
          # tarball extracts to /tmp/python with bin/, lib/, etc. — move contents up.
          cp -R /tmp/python/. resources/python-runtime/
          ls resources/python-runtime/bin

      - name: Download bundled Python (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PY_TARGET: ${{ matrix.py_target }}
        run: |
          $PyVersion = "3.12.7"
          $BuildDate = "20241016"
          $Tarball = "cpython-${PyVersion}+${BuildDate}-${env:PY_TARGET}-install_only.tar.gz"
          $Url = "https://github.com/indygreg/python-build-standalone/releases/download/${BuildDate}/${Tarball}"
          New-Item -ItemType Directory -Force -Path resources\python-runtime | Out-Null
          Invoke-WebRequest -Uri $Url -OutFile $env:TEMP\python.tar.gz
          tar -xzf $env:TEMP\python.tar.gz -C $env:TEMP
          # Tarball extracts to %TEMP%\python\ — copy contents up.
          Copy-Item -Path "$env:TEMP\python\*" -Destination "resources\python-runtime\" -Recurse -Force
          Get-ChildItem resources\python-runtime

      # Decode the base64-encoded App Store Connect API key (.p8) into a file
      # that electron-notarize can read. @electron/notarize expects APPLE_API_KEY
      # to be a *path*, not content, so we write it to disk and expose the path
      # via $GITHUB_ENV for the Build & publish step.
      - name: Decode Apple API key (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/apple-secrets"
          printf '%s' "$APPLE_API_KEY_B64" | base64 -d > "$HOME/apple-secrets/AuthKey.p8"
          chmod 600 "$HOME/apple-secrets/AuthKey.p8"
          echo "APPLE_API_KEY=$HOME/apple-secrets/AuthKey.p8" >> "$GITHUB_ENV"

      # Import the Developer ID Application cert into a dedicated keychain
      # that exists for the whole job. This lets our afterPack hook find the
      # signing identity (it runs *before* electron-builder's main signing
      # pass, which would otherwise be the only step to import CSC_LINK).
      # Once the keychain has the cert, electron-builder auto-discovers it
      # without needing CSC_LINK, so we don't pass CSC_LINK downstream.
      - name: Set up signing keychain (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          CSC_LINK_B64: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/cloudchat-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          printf '%s' "$CSC_LINK_B64" | base64 -d > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Prepend our keychain to the user search list so `security find-identity`
          # (without -k flag) sees it. Quoting keeps multi-word keychain names intact.
          EXISTING_KEYCHAINS=$(security list-keychains -d user | sed -E 's/^[[:space:]]*"?//; s/"?$//' | tr '\n' ' ')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          security find-identity -v -p codesigning
          rm "$CERT_PATH"

      - name: Build & publish
        env:
          # GITHUB_TOKEN: provided automatically by Actions, used by electron-builder
          # at PUBLISH time to upload artifacts to the release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CLOUDCHAT_UPDATE_TOKEN: fine-grained PAT (contents: read) baked into
          # the built app so end users can fetch updates from this private repo.
          # See docs/BETA-TESTING.md for setup. If unset, auto-update is disabled
          # in shipped builds — they still install fine, just won't self-update.
          CLOUDCHAT_UPDATE_TOKEN: ${{ secrets.CLOUDCHAT_UPDATE_TOKEN }}
          # Windows Authenticode signing. electron-builder picks up CSC_LINK
          # (base64 .pfx) + CSC_KEY_PASSWORD automatically on Windows. Empty on
          # other OSes (and when the secrets are unset), so the NSIS installer
          # simply ships unsigned — same as before — until a cert is added.
          CSC_LINK: ${{ runner.os == 'Windows' && secrets.WIN_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'Windows' && secrets.WIN_CSC_KEY_PASSWORD || '' }}
          # Mark prereleases automatically when tag contains a hyphen (e.g. -beta.1)
          EP_PRE_RELEASE: ${{ contains(github.ref_name, '-') }}
          # macOS App Store Connect notarization. APPLE_API_KEY (path) is injected
          # via $GITHUB_ENV by the Decode step. The Developer ID cert is in the
          # keychain set up by the previous step, so electron-builder auto-finds
          # the signing identity — no CSC_LINK needed here.
          APPLE_API_KEY_ID: ${{ runner.os == 'macOS' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ runner.os == 'macOS' && secrets.APPLE_API_KEY_ISSUER_ID || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        run: ${{ matrix.build_cmd }}
