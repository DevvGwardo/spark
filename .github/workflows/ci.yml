name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check Bundle Size
        run: |
          npx vite-bundle-visualizer --output bundle-stats.html || true
          MAX_SIZE=500000
          for chunk in dist/assets/*.js; do
            size=$(gzip -c "$chunk" | wc -c)
            echo "$chunk: $size bytes (gzip)"
            if [ "$size" -gt "$MAX_SIZE" ]; then
              echo "ERROR: $chunk exceeds 500KB gzip limit ($size bytes)"
              exit 1
            fi
          done

      - name: Build Server
        run: npx tsup server/index.ts --out-dir dist/server --format esm --target node22 --clean

  hatch-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install hatch
        run: go install github.com/grafana/hatch/cmd/hatch@latest

      - name: Verify agent configs are in sync with .hatch/
        run: |
          hatch gen -no-hatch-skill
          git diff --exit-code || {
            echo "::error::Generated agent configs are out of sync. Run 'hatch gen -no-hatch-skill' and commit the result."
            exit 1
          }
